version: "3.9"
services:
  db:
    image: postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: metabaseappdb
    networks:
      db_network:
        ipv4_address: 10.150.0.20
  metabase:
    image: metabase/metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabaseappdb
      MB_DB_PORT: 5432
      MB_DB_USER: postgres
      MB_DB_PASS: ${MB_DB_PASS}
      MB_DB_HOST: 10.150.0.20
    depends_on:
      - db
    networks:
      - db_network

networks:
  db_network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.150.0.0/24